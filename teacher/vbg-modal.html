<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif}
.modal{width:100%;height:100%;background:rgba(16,16,16,0.95);border-radius:14px;border:none;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);-webkit-app-region:drag;flex-shrink:0}
.modal-header *{-webkit-app-region:no-drag}
.modal-title{font-size:14px;font-weight:600;color:rgba(255,255,255,0.9)}
.close-btn{width:24px;height:24px;border-radius:6px;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.close-btn:hover{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.8)}
.preview-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;flex-shrink:0}
.preview-wrap video,.preview-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#bgCanvas{z-index:2;display:none}
.bg-section{flex:1;overflow-y:auto;padding:12px 16px}
.bg-section-title{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:8px}
.bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.bg-cell{text-align:center}
.bg-item{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.15s;aspect-ratio:16/10;background:#2a2a2a;display:flex;align-items:center;justify-content:center}
.bg-item:hover{border-color:rgba(255,255,255,0.25)}
.bg-item.active{border-color:#4ade80}
.bg-item img{width:100%;height:100%;object-fit:cover;display:block}
.bg-label{font-size:10px;color:rgba(255,255,255,0.45);margin-top:4px}
.bg-none-text{font-size:10px;color:rgba(255,255,255,0.35)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.btn-cancel{padding:7px 18px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer}
.btn-cancel:hover{background:rgba(255,255,255,0.08)}
.btn-confirm{padding:7px 18px;border-radius:8px;border:none;background:#1f8b73;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.btn-confirm:hover{background:#16a34a}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
</style>
</head>
<body>
<div class="modal">
  <div class="modal-header">
    <span class="modal-title">虚拟背景设置</span>
    <button class="close-btn" onclick="cancelVbg()">✕</button>
  </div>
  <div class="preview-wrap">
    <video id="camVideo" autoplay muted playsinline></video>
    <canvas id="bgCanvas"></canvas>
  </div>
  <div class="bg-section">
    <div class="bg-section-title">选择背景</div>
    <div class="bg-grid" id="bgGrid"></div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" onclick="cancelVbg()">取消</button>
    <button class="btn-confirm" onclick="confirmVbg()">确认应用</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1675465747/selfie_segmentation.js"></script>
<script src="vbg-modal-logic.js"></script>
</body>
</html>
