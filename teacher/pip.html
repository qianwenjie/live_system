<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; border-radius:12px; }
#pip, #bgCanvas {
  position:absolute; top:0; left:0; width:100%; height:100%;
  object-fit:cover; border-radius:12px; display:block;
  -webkit-app-region:drag;
}
#pip { z-index:1; }
#bgCanvas { z-index:2; display:none; }
</style>
</head>
<body>
<video id="pip" autoplay muted playsinline></video>
<canvas id="bgCanvas"></canvas>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1675465747/selfie_segmentation.js"></script>
<script>
var stream = null;
var currentBg = 'none';
var bgImages = {};
var segRaf = null;
var segmentation = null;

var BG_URLS = { meeting:'bg-meeting.jpg', study:'bg-study.jpg', living:'bg-living.jpg' };
Object.keys(BG_URLS).forEach(function(k) {
  var img = new Image(); img.src = BG_URLS[k]; bgImages[k] = img;
});

function startCamera(deviceId) {
  var constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : true };
  navigator.mediaDevices.getUserMedia(constraints).then(function(s) {
    stream = s;
    document.getElementById('pip').srcObject = s;
    if (currentBg !== 'none') startBgCanvas();
  }).catch(function(){});
}

function initSeg() {
  if (segmentation) return;
  segmentation = new SelfieSegmentation({
    locateFile: function(file) {
      return 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1.1675465747/' + file;
    }
  });
  segmentation.setOptions({ modelSelection: 1, selfieMode: false });
  segmentation.onResults(onResults);
}

function onResults(results) {
  var canvas = document.getElementById('bgCanvas');
  var w = canvas.width = results.image.width;
  var h = canvas.height = results.image.height;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  if (currentBg !== 'none' && bgImages[currentBg] && bgImages[currentBg].complete) {
    ctx.drawImage(bgImages[currentBg], 0, 0, w, h);
  }
  var off = document.createElement('canvas');
  off.width = w; off.height = h;
  var octx = off.getContext('2d');
  octx.filter = 'blur(6px)';
  octx.drawImage(results.segmentationMask, 0, 0, w, h);
  octx.filter = 'none';
  octx.globalCompositeOperation = 'source-in';
  octx.drawImage(results.image, 0, 0, w, h);
  ctx.drawImage(off, 0, 0);
}

function startBgCanvas() {
  var video = document.getElementById('pip');
  var canvas = document.getElementById('bgCanvas');
  canvas.style.display = 'block';
  video.style.display = 'none';
  initSeg();
  function loop() {
    if (!stream || currentBg === 'none') {
      segRaf = requestAnimationFrame(loop);
      return;
    }
    if (video.readyState < 2 || video.videoWidth === 0) {
      segRaf = requestAnimationFrame(loop);
      return;
    }
    segmentation.send({ image: video }).then(function() {
      segRaf = requestAnimationFrame(loop);
    });
  }
  if (segRaf) cancelAnimationFrame(segRaf);
  loop();
}

function stopBgCanvas() {
  if (segRaf) { cancelAnimationFrame(segRaf); segRaf = null; }
  document.getElementById('bgCanvas').style.display = 'none';
  document.getElementById('pip').style.display = 'block';
}

function stopStream() {
  if (segRaf) { cancelAnimationFrame(segRaf); segRaf = null; }
  if (stream) { stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  document.getElementById('pip').srcObject = null;
}

// 窗口关闭/卸载时也停流，防止物理摄像头灯常亮
window.addEventListener('beforeunload', function() { stopStream(); });

if (window.pipAPI) {
  window.pipAPI.onStream(function(data) { startCamera(data.deviceId); });
  window.pipAPI.onVbgChange(function(bgId) {
    currentBg = bgId;
    if (bgId === 'none') stopBgCanvas();
    else startBgCanvas();
  });
  window.pipAPI.onStopStream(function() { stopStream(); });
}
</script>
</body>
</html>
