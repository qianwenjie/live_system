<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
.bar {
  display:flex; align-items:center; gap:6px;
  background:rgba(20,20,20,0.88);
  backdrop-filter:blur(12px);
  border-radius:14px;
  padding:0 12px;
  height:52px;
  border:1px solid rgba(255,255,255,0.12);
  -webkit-app-region:drag;
  user-select:none;
}
.bar * { -webkit-app-region:no-drag; }
.bar-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
.bar-divider { width:1px; height:24px; background:rgba(255,255,255,0.15); margin:0 4px; flex-shrink:0; }

/* 信号 */
.signal-wrap { display:flex; align-items:flex-end; gap:2px; height:16px; }
.signal-bar { width:3px; border-radius:1px; background:rgba(255,255,255,0.2); }
.signal-bar.on { background:#22c55e; }
.signal-label { font-size:10px; color:rgba(255,255,255,0.5); margin-top:2px; }

/* 计时 */
.timer { font-size:13px; font-weight:600; color:#fff; font-variant-numeric:tabular-nums; letter-spacing:.5px; }
.timer-label { font-size:10px; color:rgba(255,255,255,0.4); }

/* 工具按钮 */
.tool-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 10px; border-radius:8px; border:none;
  background:transparent; color:rgba(255,255,255,0.75);
  font-size:10px; cursor:pointer; transition:.15s; min-width:52px;
}
.tool-btn:hover { background:rgba(255,255,255,0.1); }
.tool-btn.off { color:#ef4444; }
.tool-btn svg { flex-shrink:0; }

/* 互动区按钮 */
.chat-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 10px; border-radius:8px; border:none;
  background:rgba(31,139,115,0.25); color:#4ade80;
  font-size:10px; cursor:pointer; transition:.15s; min-width:52px;
}
.chat-btn:hover { background:rgba(31,139,115,0.4); }

/* 结束按钮 */
.end-btn {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px; border-radius:8px; border:none;
  background:#ef4444; color:#fff;
  font-size:12px; font-weight:600; cursor:pointer; transition:.15s;
  white-space:nowrap;
}
.end-btn:hover { background:#dc2626; }

/* 麦克风音量条 */
.mic-wrap { position:relative; }
.mic-level-bar {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  width:3px; border-radius:2px; background:#22c55e;
  transition:height .1s;
}
</style>
</head>
<body>
<div class="bar" id="bar">
  <!-- 信号 -->
  <div class="bar-item">
    <div class="signal-wrap" id="signalWrap">
      <div class="signal-bar" style="height:4px" id="s1"></div>
      <div class="signal-bar" style="height:7px" id="s2"></div>
      <div class="signal-bar" style="height:10px" id="s3"></div>
      <div class="signal-bar" style="height:13px" id="s4"></div>
    </div>
    <span class="signal-label" id="signalLabel">信号强</span>
  </div>

  <div class="bar-divider"></div>

  <!-- 共享标识 -->
  <div class="bar-item" style="max-width:120px;overflow:hidden">
    <span style="font-size:10px;color:#4ade80;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px" id="shareLabel">共享中</span>
    <span style="font-size:10px;color:rgba(255,255,255,0.4)">屏幕共享</span>
  </div>

  <div class="bar-divider"></div>

  <!-- 计时 -->
  <div class="bar-item">
    <span class="timer" id="timer">00:00:00</span>
    <span class="timer-label">已直播</span>
  </div>

  <div class="bar-divider"></div>

  <!-- 麦克风 -->
  <button class="tool-btn" id="micBtn" onclick="toggle('mic')">
    <div class="mic-wrap">
      <svg id="micIcon" width="16" height="22" viewBox="0 0 16 24">
        <rect x="4" y="0.5" width="8" height="13" rx="4" fill="currentColor"/>
        <path d="M1 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        <line x1="8" y1="17" x2="8" y2="20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="4" y1="20.5" x2="12" y2="20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line id="micSlash" x1="-4" y1="1" x2="22" y2="23" stroke="white" stroke-width="2.2" stroke-linecap="round" style="display:none"/>
      </svg>
    </div>
    <span id="micLabel">麦克风</span>
  </button>

  <!-- 摄像头 -->
  <button class="tool-btn" id="camBtn" onclick="toggle('cam')">
    <svg width="22" height="17" viewBox="0 0 1024 1024">
      <path id="camPath" d="M943.488 260a32.008 32.008 0 0 0-32.48 0.864L800 330.368V288c0-52.928-43.072-96-96-96H160c-52.928 0-96 43.072-96 96v448c0 52.928 43.072 96 96 96h544c52.928 0 96-43.072 96-96v-38.88l111.648 66.368A31.818 31.818 0 0 0 928 768a31.938 31.938 0 0 0 15.808-4.192A32.001 32.001 0 0 0 960 736V288a31.947 31.947 0 0 0-16.512-28z" fill="currentColor"/>
      <line id="camSlash" x1="80" y1="80" x2="944" y2="944" stroke="white" stroke-width="100" stroke-linecap="round" style="display:none"/>
    </svg>
    <span id="camLabel">摄像头</span>
  </button>

  <div class="bar-divider"></div>

  <!-- 互动区 -->
  <button class="chat-btn" id="chatBtn" onclick="toggle('chat')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    </svg>
    <span id="chatLabel">互动区</span>
  </button>

  <div class="bar-divider"></div>

  <!-- 结束 -->
  <button class="end-btn" onclick="toggle('stop')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
      <rect x="2" y="2" width="20" height="20" rx="4"/>
      <line x1="7" y1="7" x2="17" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="17" y1="7" x2="7" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    结束共享
  </button>
</div>

<script>
var state = { micOn: false, camOn: false, chatOpen: false, signal: 3, seconds: 0 };

function toggle(type) {
  if (window.toolbarAPI) window.toolbarAPI.sendAction(type);
}

function pad(n) { return String(n).padStart(2,'0'); }

function updateTimer() {
  var s = state.seconds;
  document.getElementById('timer').textContent =
    pad(Math.floor(s/3600)) + ':' + pad(Math.floor(s%3600/60)) + ':' + pad(s%60);
}

function updateSignal() {
  var sig = state.signal;
  ['s1','s2','s3','s4'].forEach(function(id, i) {
    var el = document.getElementById(id);
    el.classList.toggle('on', i < sig);
  });
  var labels = ['','信号弱','信号中','信号强','信号强'];
  document.getElementById('signalLabel').textContent = labels[sig] || '信号弱';
}

function updateMic() {
  var btn = document.getElementById('micBtn');
  var slash = document.getElementById('micSlash');
  btn.classList.toggle('off', !state.micOn);
  slash.style.display = state.micOn ? 'none' : 'block';
  document.getElementById('micLabel').textContent = state.micOn ? '关闭麦克风' : '开启麦克风';
}

function updateCam() {
  var btn = document.getElementById('camBtn');
  var slash = document.getElementById('camSlash');
  btn.classList.toggle('off', !state.camOn);
  slash.style.display = state.camOn ? 'none' : 'block';
  document.getElementById('camPath').setAttribute('fill', state.camOn ? 'currentColor' : '#ef4444');
  document.getElementById('camLabel').textContent = state.camOn ? '关闭摄像头' : '开启摄像头';
}

function updateChat() {
  document.getElementById('chatLabel').textContent = state.chatOpen ? '收起互动' : '互动区';
}

if (window.toolbarAPI) {
  window.toolbarAPI.onStateUpdate(function(s) {
    Object.assign(state, s);
    updateMic(); updateCam(); updateSignal(); updateChat();
    if (s.screenLabel) document.getElementById('shareLabel').textContent = s.screenLabel;
  });
  window.toolbarAPI.onTimerTick(function(d) {
    state.seconds = d.seconds;
    state.signal = d.signal;
    updateTimer(); updateSignal();
  });
}

updateTimer(); updateSignal(); updateMic(); updateCam();
</script>
</body>
</html>
