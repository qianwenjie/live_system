<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }

.bar {
  display:flex; align-items:center; gap:4px;
  background:rgba(20,20,20,0.88);
  backdrop-filter:blur(12px);
  border-radius:14px;
  padding:0 10px;
  height:52px;
  border:1px solid rgba(255,255,255,0.12);
  -webkit-app-region:drag;
  user-select:none;
}
.bar * { -webkit-app-region:no-drag; }

.bar-divider { width:1px; height:24px; background:rgba(255,255,255,0.15); margin:0 2px; flex-shrink:0; }

/* 统一 item 高度，垂直居中 */
.bar-item {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; height:52px;
}

/* 信号 */
.signal-wrap { display:flex; align-items:flex-end; gap:2px; height:14px; }
.signal-bar { width:3px; border-radius:1px; background:rgba(255,255,255,0.2); }
.signal-bar.on { background:#22c55e; }
.bar-label { font-size:10px; color:rgba(255,255,255,0.4); line-height:1; }

/* 计时 */
.timer { font-size:13px; font-weight:600; color:#fff; font-variant-numeric:tabular-nums; letter-spacing:.5px; line-height:1; }

/* 共享标识 */
.share-label { font-size:11px; color:#4ade80; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:110px; line-height:1; }

/* 应用图标列表（多应用时） */
.app-icons { display:flex; align-items:center; gap:3px; }
.app-icon-img { width:18px; height:18px; border-radius:4px; object-fit:contain; }
.app-icon-more { font-size:10px; color:rgba(255,255,255,0.5); }

/* 工具按钮 */
.tool-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; padding:0 10px; border-radius:8px; border:none;
  background:transparent; color:rgba(255,255,255,0.75);
  font-size:10px; cursor:pointer; transition:.15s;
  height:40px; min-width:48px; white-space:nowrap;
}
.tool-btn:hover { background:rgba(255,255,255,0.1); }
.tool-btn.off { color:#ef4444; }
.tool-btn svg { flex-shrink:0; display:block; }

/* 麦克风音量条（SVG 内部绿色填充） */
.mic-svg-wrap { position:relative; width:16px; height:22px; }

/* 互动区按钮 */
.chat-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; padding:0 10px; border-radius:8px; border:none;
  background:rgba(31,139,115,0.25); color:#4ade80;
  font-size:10px; cursor:pointer; transition:.15s;
  height:40px; min-width:48px; white-space:nowrap;
}
.chat-btn:hover { background:rgba(31,139,115,0.4); }

/* 结束按钮 */
.end-btn {
  display:flex; align-items:center; gap:6px;
  padding:0 14px; border-radius:8px; border:none;
  background:#ef4444; color:#fff;
  font-size:12px; font-weight:600; cursor:pointer; transition:.15s;
  height:36px; white-space:nowrap; flex-shrink:0;
}
.end-btn:hover { background:#dc2626; }
</style>
</head>
<body>
<div class="bar" id="bar">

  <!-- 信号 -->
  <div class="bar-item" style="min-width:36px">
    <div class="signal-wrap">
      <div class="signal-bar" style="height:4px" id="s1"></div>
      <div class="signal-bar" style="height:7px" id="s2"></div>
      <div class="signal-bar" style="height:10px" id="s3"></div>
      <div class="signal-bar" style="height:13px" id="s4"></div>
    </div>
    <span class="bar-label" id="signalLabel">信号强</span>
  </div>

  <div class="bar-divider"></div>

  <!-- 共享标识 -->
  <div class="bar-item" style="min-width:60px;max-width:130px;align-items:flex-start">
    <div class="app-icons" id="appIconsWrap" style="display:none"></div>
    <span class="share-label" id="shareLabel">共享中</span>
    <span class="bar-label">屏幕共享</span>
  </div>

  <div class="bar-divider"></div>

  <!-- 计时 -->
  <div class="bar-item" style="min-width:60px">
    <span class="timer" id="timer">00:00:00</span>
    <span class="bar-label">已直播</span>
  </div>

  <div class="bar-divider"></div>

  <!-- 麦克风 -->
  <button class="tool-btn" id="micBtn" onclick="toggle('mic')">
    <svg width="16" height="22" viewBox="0 0 16 24">
      <defs>
        <clipPath id="micClip">
          <rect x="4" y="0.5" width="8" height="13" rx="4"/>
        </clipPath>
      </defs>
      <!-- 麦克风轮廓 -->
      <rect x="4" y="0.5" width="8" height="13" rx="4" fill="currentColor"/>
      <!-- 绿色音量填充，从底部往上 -->
      <rect id="micLevelRect" x="4" y="13.5" width="8" height="0" fill="#22c55e" clip-path="url(#micClip)"/>
      <path d="M1 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <line x1="8" y1="17" x2="8" y2="20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="20.5" x2="12" y2="20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line id="micSlash" x1="-4" y1="1" x2="22" y2="23" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round" style="display:none"/>
    </svg>
    <span id="micLabel">开启麦克风</span>
  </button>

  <!-- 摄像头 -->
  <button class="tool-btn" id="camBtn" onclick="toggle('cam')">
    <svg width="22" height="17" viewBox="0 0 1024 1024">
      <path id="camPath" d="M943.488 260a32.008 32.008 0 0 0-32.48 0.864L800 330.368V288c0-52.928-43.072-96-96-96H160c-52.928 0-96 43.072-96 96v448c0 52.928 43.072 96 96 96h544c52.928 0 96-43.072 96-96v-38.88l111.648 66.368A31.818 31.818 0 0 0 928 768a31.938 31.938 0 0 0 15.808-4.192A32.001 32.001 0 0 0 960 736V288a31.947 31.947 0 0 0-16.512-28z" fill="currentColor"/>
      <line id="camSlash" x1="80" y1="80" x2="944" y2="944" stroke="#ef4444" stroke-width="100" stroke-linecap="round" style="display:none"/>
    </svg>
    <span id="camLabel">开启摄像头</span>
  </button>

  <div class="bar-divider"></div>

  <!-- 互动区 -->
  <button class="chat-btn" id="chatBtn" onclick="toggle('chat')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    </svg>
    <span id="chatLabel">互动区</span>
  </button>

  <div class="bar-divider"></div>

  <!-- 结束 -->
  <button class="end-btn" onclick="toggle('stop')">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
      <rect x="2" y="2" width="20" height="20" rx="4"/>
    </svg>
    结束共享
  </button>

</div>

<script>
var state = { micOn: false, camOn: false, chatOpen: false, signal: 3, seconds: 0, appIcons: [] };
var micCtx = null, micAnalyser = null, micBuf = null, micRaf = null;

function toggle(type) {
  if (window.toolbarAPI) window.toolbarAPI.sendAction(type);
}

function pad(n) { return String(n).padStart(2,'0'); }

function updateTimer() {
  var s = state.seconds;
  document.getElementById('timer').textContent =
    pad(Math.floor(s/3600)) + ':' + pad(Math.floor(s%3600/60)) + ':' + pad(s%60);
}

function updateSignal() {
  var sig = state.signal;
  ['s1','s2','s3','s4'].forEach(function(id, i) {
    document.getElementById(id).classList.toggle('on', i < sig);
  });
  var labels = ['','信号弱','信号中','信号强','信号强'];
  document.getElementById('signalLabel').textContent = labels[sig] || '信号弱';
}

function updateMic() {
  var btn = document.getElementById('micBtn');
  btn.classList.toggle('off', !state.micOn);
  document.getElementById('micSlash').style.display = state.micOn ? 'none' : 'block';
  document.getElementById('micLabel').textContent = state.micOn ? '关闭麦克风' : '开启麦克风';
  if (state.micOn) startMicMeter(); else stopMicMeter();
}

function updateCam() {
  var btn = document.getElementById('camBtn');
  btn.classList.toggle('off', !state.camOn);
  document.getElementById('camSlash').style.display = state.camOn ? 'none' : 'block';
  document.getElementById('camLabel').textContent = state.camOn ? '关闭摄像头' : '开启摄像头';
}

function updateChat() {
  document.getElementById('chatLabel').textContent = state.chatOpen ? '收起互动' : '互动区';
}

function updateShareLabel(label, icons) {
  document.getElementById('shareLabel').textContent = label || '共享中';
  var wrap = document.getElementById('appIconsWrap');
  if (icons && icons.length > 0) {
    wrap.style.display = 'flex';
    wrap.innerHTML = '';
    var show = icons.slice(0, 3);
    show.forEach(function(src) {
      if (!src) return;
      var img = document.createElement('img');
      img.src = src; img.className = 'app-icon-img';
      wrap.appendChild(img);
    });
    if (icons.length > 3) {
      var more = document.createElement('span');
      more.className = 'app-icon-more';
      more.textContent = '+' + (icons.length - 3);
      wrap.appendChild(more);
    }
  } else {
    wrap.style.display = 'none';
  }
}

/* 麦克风音量采集 */
function startMicMeter() {
  if (micCtx) return;
  navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
    micCtx = new AudioContext();
    var src = micCtx.createMediaStreamSource(stream);
    micAnalyser = micCtx.createAnalyser();
    micAnalyser.fftSize = 256;
    micAnalyser.smoothingTimeConstant = 0.6;
    src.connect(micAnalyser);
    micBuf = new Uint8Array(micAnalyser.frequencyBinCount);
    function tick() {
      if (!state.micOn) { stopMicMeter(); return; }
      micAnalyser.getByteFrequencyData(micBuf);
      var sum = 0;
      for (var i = 0; i < micBuf.length; i++) sum += micBuf[i];
      var level = Math.min(1, sum / micBuf.length / 128 * 2);
      // 从底部往上填充：胶囊高度13，y从13.5往上
      var h = level * 13;
      var rect = document.getElementById('micLevelRect');
      if (rect) { rect.setAttribute('y', 13.5 - h); rect.setAttribute('height', h); }
      micRaf = requestAnimationFrame(tick);
    }
    tick();
  }).catch(function() {});
}

function stopMicMeter() {
  if (micRaf) { cancelAnimationFrame(micRaf); micRaf = null; }
  if (micCtx) { micCtx.close(); micCtx = null; }
  micAnalyser = null; micBuf = null;
  var rect = document.getElementById('micLevelRect');
  if (rect) { rect.setAttribute('y', 13.5); rect.setAttribute('height', 0); }
}

if (window.toolbarAPI) {
  window.toolbarAPI.onStateUpdate(function(s) {
    Object.assign(state, s);
    updateMic(); updateCam(); updateSignal(); updateChat();
    updateShareLabel(s.screenLabel, s.appIcons);
  });
  window.toolbarAPI.onTimerTick(function(d) {
    state.seconds = d.seconds; state.signal = d.signal;
    updateTimer(); updateSignal();
  });
}

updateTimer(); updateSignal(); updateMic(); updateCam();
</script>
</body>
</html>
