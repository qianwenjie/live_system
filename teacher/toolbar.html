<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }

/* bar 固定在窗口底部 */
.bar {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:4px;
  background:rgba(16,16,16,0.95); backdrop-filter:blur(12px);
  border-radius:14px; padding:0 10px; height:52px;
  border:none;
  -webkit-app-region:drag; user-select:none; white-space:nowrap;
}
.bar * { -webkit-app-region:no-drag; }
.bar-divider { width:1px; height:24px; background:rgba(255,255,255,0.15); margin:0 2px; flex-shrink:0; }
.bar-item {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; height:40px; min-width:44px;
}
.bar-icon-row { display:flex; align-items:center; justify-content:center; height:18px; }
.signal-wrap { display:flex; align-items:flex-end; gap:2px; height:14px; }
.signal-bar { width:3px; border-radius:1px; background:rgba(255,255,255,0.2); }
.signal-bar.on { background:#22c55e; }
.bar-label { font-size:10px; color:rgba(255,255,255,0.4); line-height:1; }
.timer { font-size:13px; font-weight:600; color:#fff; font-variant-numeric:tabular-nums; letter-spacing:.5px; line-height:1; }
.share-label { font-size:11px; color:#4ade80; font-weight:600; white-space:nowrap; line-height:1; }
.app-icons { display:flex; align-items:center; gap:3px; }
.app-icon-img { width:20px; height:20px; border-radius:4px; object-fit:contain; }
.app-icon-more { font-size:10px; color:rgba(255,255,255,0.5); }

/* 工具按钮组 */
.tool-group { display:flex; align-items:center; height:40px; position:relative; }
.tool-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:0 8px; border-radius:8px 0 0 8px; border:none;
  background:transparent; color:rgba(255,255,255,0.75);
  font-size:10px; cursor:pointer; transition:.15s; height:40px; min-width:44px;
}
.tool-btn:hover { background:rgba(255,255,255,0.1); }
.tool-btn.off { color:#ef4444; }
.tool-btn span { color:rgba(255,255,255,0.4); }
.tool-btn.off span { color:#ef4444; }
.tool-btn svg { flex-shrink:0; display:block; color:rgba(255,255,255,0.9); }
.tool-btn.off svg { color:#ef4444; }
.tool-arrow {
  display:flex; align-items:center; justify-content:center;
  width:18px; height:40px; border:none; border-radius:0 8px 8px 0;
  background:transparent; color:rgba(255,255,255,0.4);
  cursor:pointer; transition:.15s; padding:0;
  border-left:none;
}
.tool-arrow:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.8); }
.tool-arrow.open { color:#4ade80; }

/* 互动区 / 结束按钮 */
.chat-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:0 10px; border-radius:8px; border:none;
  background:rgba(31,139,115,0.25); color:#4ade80;
  font-size:10px; cursor:pointer; transition:.15s; height:40px; min-width:48px;
}
.chat-btn:hover { background:rgba(31,139,115,0.4); }
.end-btn {
  display:flex; align-items:center; gap:6px; padding:0 14px; border-radius:8px; border:none;
  background:#ef4444; color:#fff; font-size:12px; font-weight:600;
  cursor:pointer; transition:.15s; height:36px; white-space:nowrap; flex-shrink:0;
}
.end-btn:hover { background:#dc2626; }

/* 自定义下拉面板 */
.popup-panel {
  display:none; position:absolute; bottom:66px;
  background:rgba(22,22,24,0.96); backdrop-filter:blur(20px) saturate(180%);
  border:none; border-radius:12px;
  padding:8px 0; min-width:200px; z-index:100;
  box-shadow:0 12px 40px rgba(0,0,0,0.6);
  animation:popIn .15s cubic-bezier(.32,1,.32,1);
}
.popup-panel.show { display:block; }
@keyframes popIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.popup-section-title {
  padding:6px 14px 4px; font-size:10px; color:rgba(255,255,255,0.3);
  letter-spacing:.5px; text-transform:uppercase;
}
.popup-item {
  display:flex; align-items:center;
  padding:8px 14px; font-size:12px; color:rgba(255,255,255,0.82);
  cursor:pointer; transition:.1s;
}
.popup-item:hover { background:rgba(255,255,255,0.07); }
.popup-item.active { color:#4ade80; font-weight:600; }
.popup-sep { height:1px; background:rgba(255,255,255,0.08); margin:4px 0; }
.popup-item-icon { width:18px; height:18px; border-radius:4px; object-fit:contain; flex-shrink:0; }

</style>
</head>
<body>
<div class="bar" id="bar">
  <!-- 信号 -->
  <div class="bar-item" style="min-width:36px">
    <div class="bar-icon-row">
      <div class="signal-wrap">
        <div class="signal-bar" style="height:4px" id="s1"></div>
        <div class="signal-bar" style="height:7px" id="s2"></div>
        <div class="signal-bar" style="height:10px" id="s3"></div>
        <div class="signal-bar" style="height:13px" id="s4"></div>
      </div>
    </div>
    <span class="bar-label" id="signalLabel">信号强</span>
  </div>
  <div class="bar-divider"></div>
  <!-- 共享标识 -->
  <div class="bar-item" style="min-width:40px">
    <div class="bar-icon-row">
      <div class="app-icons" id="appIconsWrap" style="display:none"></div>
      <span class="share-label" id="shareLabel">共享中</span>
    </div>
    <span class="bar-label">屏幕共享</span>
  </div>
  <div class="bar-divider"></div>
  <!-- 计时 -->
  <div class="bar-item" style="min-width:60px">
    <div class="bar-icon-row">
      <span class="timer" id="timer">00:00:00</span>
    </div>
    <span class="bar-label">已直播</span>
  </div>
  <div class="bar-divider"></div>
  <!-- 麦克风 -->
  <div class="tool-group" id="micGroup">
    <button class="tool-btn" id="micBtn" onclick="toggle('mic')">
      <svg width="14" height="18" viewBox="0 0 16 24">
        <defs><clipPath id="micClip"><rect x="4" y="0.5" width="8" height="13" rx="4"/></clipPath></defs>
        <rect x="4" y="0.5" width="8" height="13" rx="4" fill="currentColor"/>
        <rect id="micLevelRect" x="4" y="13.5" width="8" height="0" fill="#22c55e" clip-path="url(#micClip)"/>
        <path d="M1 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        <line x1="8" y1="17" x2="8" y2="20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="4" y1="20.5" x2="12" y2="20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line id="micSlash" x1="-4" y1="1" x2="22" y2="23" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round" style="display:none"/>
      </svg>
      <span id="micLabel">麦克风</span>
    </button>
    <button class="tool-arrow" id="micArrow" onclick="togglePanel('micPanel',event)">
      <svg width="8" height="5" viewBox="0 0 8 5"><path d="M0 0l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="popup-panel" id="micPanel" style="left:0">
      <div class="popup-section-title">选择麦克风</div>
      <div id="micList"></div>
    </div>
  </div>
  <!-- 摄像头 -->
  <div class="tool-group" id="camGroup">
    <button class="tool-btn" id="camBtn" onclick="toggle('cam')">
      <svg width="22" height="17" viewBox="0 0 1024 1024">
        <path d="M943.488 260a32.008 32.008 0 0 0-32.48 0.864L800 330.368V288c0-52.928-43.072-96-96-96H160c-52.928 0-96 43.072-96 96v448c0 52.928 43.072 96 96 96h544c52.928 0 96-43.072 96-96v-38.88l111.648 66.368A31.818 31.818 0 0 0 928 768a31.938 31.938 0 0 0 15.808-4.192A32.001 32.001 0 0 0 960 736V288a31.947 31.947 0 0 0-16.512-28z" fill="currentColor"/>
        <line id="camSlash" x1="80" y1="80" x2="944" y2="944" stroke="#ef4444" stroke-width="100" stroke-linecap="round" style="display:none"/>
      </svg>
      <span id="camLabel">摄像头</span>
    </button>
    <button class="tool-arrow" id="camArrow" onclick="togglePanel('camPanel',event)">
      <svg width="8" height="5" viewBox="0 0 8 5"><path d="M0 0l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="popup-panel" id="camPanel" style="left:0">
      <div class="popup-section-title">选择摄像头</div>
      <div id="camList"></div>
      <div class="popup-sep"></div>
      <div class="popup-item" onclick="openVbg(event)">
        <span class="pi-check"></span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        设置虚拟背景
      </div>
    </div>
  </div>
  <div class="bar-divider"></div>
  <!-- 互动区 -->
  <button class="chat-btn" id="chatBtn" onclick="toggle('chat')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <span id="chatLabel">展开聊天</span>
  </button>
  <div class="bar-divider"></div>
  <!-- 结束 -->
  <button class="end-btn" onclick="toggle('stop')">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="4"/></svg>
    结束共享
  </button>
</div>

<script src="toolbar-logic.js"></script>
</body>
</html>
