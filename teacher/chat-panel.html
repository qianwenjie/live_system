<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif; }

.panel {
  width:100%; height:100%;
  background:rgba(16,16,16,0.95);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  display:flex; flex-direction:column; overflow:hidden;
  animation:slideIn .2s cubic-bezier(.32,1,.32,1);
}
@keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }

.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px 8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  -webkit-app-region:drag; flex-shrink:0;
}
.panel-header * { -webkit-app-region:no-drag; }
.panel-title { font-size:13px; font-weight:600; color:rgba(255,255,255,0.9); }
.close-btn {
  width:22px; height:22px; border-radius:6px; border:none;
  background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.5); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.close-btn:hover { background:rgba(255,255,255,0.18); color:rgba(255,255,255,0.8); }

.t-chat-head {
  padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.08);
  background:transparent; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.t-chat-tabs { display:flex; gap:4px; }
.t-chat-tab {
  padding:5px 10px; border-radius:8px; border:none;
  background:transparent; font-size:13px; color:rgba(255,255,255,0.5);
  cursor:pointer; transition:.15s; white-space:nowrap;
}
.t-chat-tab.active { background:rgba(31,139,115,0.3); color:#4ade80; font-weight:600; }
.t-mute-all-btn {
  padding:4px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.12);
  background:transparent; font-size:12px; color:rgba(255,255,255,0.5); cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.t-mute-all-btn:hover { border-color:#fca5a5; color:#ef4444; }
</style>
</head>
<body>
<div class="panel">
  <div class="panel-header">
    <span class="panel-title">互动区</span>
    <button class="close-btn" onclick="closePanel()">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
        <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="t-chat-head">
    <div class="t-chat-tabs">
      <button class="t-chat-tab active" id="tabChat" onclick="switchTab('chat')">互动</button>
      <button class="t-chat-tab" id="tabStudents" onclick="switchTab('students')">学生 (<span id="studentCount">0</span>)</button>
    </div>
    <button class="t-mute-all-btn" id="muteAllBtn" onclick="toggleAllMute()">全体禁言</button>
  </div>
  <div id="chatView" style="display:flex;flex-direction:column;flex:1;overflow:hidden"></div>
  <div id="studentsView" style="display:none;flex-direction:column;flex:1;overflow:hidden"></div>
</div>
<script src="chat-panel-logic.js"></script>
</body>
</html>
