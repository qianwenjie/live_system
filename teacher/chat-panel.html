<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }

.panel {
  width:100%; height:100%;
  background:rgba(20,20,20,0.92);
  backdrop-filter:blur(16px);
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  display:flex; flex-direction:column;
  animation:slideIn .2s cubic-bezier(.32,1,.32,1);
  overflow:hidden;
}
@keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }

.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  -webkit-app-region:drag;
}
.panel-header * { -webkit-app-region:no-drag; }
.panel-title { font-size:13px; font-weight:600; color:#fff; }
.close-btn {
  width:24px; height:24px; border-radius:6px; border:none;
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.close-btn:hover { background:rgba(255,255,255,0.15); }

.tab-bar {
  display:flex; padding:8px 12px 0; gap:4px;
}
.tab {
  flex:1; padding:6px 0; border-radius:6px 6px 0 0; border:none;
  background:transparent; color:rgba(255,255,255,0.4);
  font-size:12px; cursor:pointer; transition:.15s;
}
.tab.active { background:rgba(255,255,255,0.08); color:#fff; font-weight:600; }

.msg-list {
  flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:8px;
}
.msg-list::-webkit-scrollbar { width:4px; }
.msg-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }

.msg-item { display:flex; flex-direction:column; gap:2px; }
.msg-name { font-size:11px; color:rgba(255,255,255,0.4); }
.msg-bubble {
  background:rgba(255,255,255,0.08); border-radius:8px;
  padding:6px 10px; font-size:12px; color:rgba(255,255,255,0.85);
  line-height:1.5; word-break:break-all; max-width:100%;
}
.msg-item.self .msg-bubble { background:rgba(31,139,115,0.3); color:#fff; }

.input-area {
  padding:10px 12px;
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex; gap:8px; align-items:flex-end;
}
.msg-input {
  flex:1; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
  border-radius:8px; padding:7px 10px; color:#fff; font-size:12px;
  resize:none; outline:none; line-height:1.4; max-height:72px;
}
.msg-input::placeholder { color:rgba(255,255,255,0.3); }
.send-btn {
  padding:7px 12px; border-radius:8px; border:none;
  background:#1f8b73; color:#fff; font-size:12px; font-weight:600;
  cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.send-btn:hover { background:#17755f; }

/* 学生列表 */
.student-list { flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:4px; }
.student-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; border-radius:8px; background:rgba(255,255,255,0.05);
}
.student-name { font-size:12px; color:rgba(255,255,255,0.8); }
.mute-btn {
  padding:3px 8px; border-radius:4px; border:1px solid rgba(255,255,255,0.2);
  background:transparent; color:rgba(255,255,255,0.5); font-size:11px; cursor:pointer;
}
.mute-btn:hover { background:rgba(255,255,255,0.1); }
.mute-all-bar {
  padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex; justify-content:flex-end;
}
.mute-all-btn {
  padding:5px 12px; border-radius:6px; border:1px solid rgba(255,255,255,0.2);
  background:transparent; color:rgba(255,255,255,0.6); font-size:11px; cursor:pointer;
}
.mute-all-btn:hover { background:rgba(255,255,255,0.08); }
</style>
</head>
<body>
<div class="panel">
  <div class="panel-header">
    <span class="panel-title">互动区</span>
    <button class="close-btn" onclick="closePanel()">
      <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
        <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="tab-bar">
    <button class="tab active" id="tabChat" onclick="switchTab('chat')">聊天</button>
    <button class="tab" id="tabStudents" onclick="switchTab('students')">学生列表</button>
  </div>

  <!-- 聊天 -->
  <div id="chatView" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="msg-list" id="msgList">
      <div class="msg-item">
        <span class="msg-name">张同学</span>
        <div class="msg-bubble">老师好！</div>
      </div>
      <div class="msg-item">
        <span class="msg-name">李同学</span>
        <div class="msg-bubble">今天讲什么内容？</div>
      </div>
      <div class="msg-item self">
        <span class="msg-name">我（老师）</span>
        <div class="msg-bubble">大家好，今天讲第三章</div>
      </div>
    </div>
    <div class="input-area">
      <textarea class="msg-input" id="msgInput" placeholder="发送消息..." rows="1"
        onkeydown="onKey(event)"></textarea>
      <button class="send-btn" onclick="sendMsg()">发送</button>
    </div>
  </div>

  <!-- 学生列表 -->
  <div id="studentsView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="mute-all-bar">
      <button class="mute-all-btn" onclick="muteAll()">全体静音</button>
    </div>
    <div class="student-list" id="studentList">
      <div class="student-item"><span class="student-name">张同学</span><button class="mute-btn">静音</button></div>
      <div class="student-item"><span class="student-name">李同学</span><button class="mute-btn">静音</button></div>
      <div class="student-item"><span class="student-name">王同学</span><button class="mute-btn">静音</button></div>
    </div>
  </div>
</div>

<script>
function closePanel() {
  if (window.toolbarAPI) window.toolbarAPI.sendAction('chat');
}

function switchTab(tab) {
  document.getElementById('tabChat').classList.toggle('active', tab === 'chat');
  document.getElementById('tabStudents').classList.toggle('active', tab === 'students');
  document.getElementById('chatView').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('studentsView').style.display = tab === 'students' ? 'flex' : 'none';
}

function sendMsg() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text) return;
  var list = document.getElementById('msgList');
  var item = document.createElement('div');
  item.className = 'msg-item self';
  item.innerHTML = '<span class="msg-name">我（老师）</span><div class="msg-bubble">' + text + '</div>';
  list.appendChild(item);
  list.scrollTop = list.scrollHeight;
  input.value = '';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function muteAll() {}
</script>
</body>
</html>
