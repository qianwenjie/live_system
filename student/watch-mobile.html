<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>学生观看直播</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23198f72'/%3E%3Cpath d='M18 20h24a6 6 0 0 1 6 6v12a6 6 0 0 1-6 6H18z' fill='white'/%3E%3Cpath d='M42 29l10-6v18l-10-6z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style-mobile.css">
  <script src="../vendor/lucide.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="m-wrap" :class="{ 'stage-fullscreen': isFullscreen }">

      <!-- 顶部栏 -->
      <header class="m-head">
        <div class="m-head-main">
          <div class="m-title">{{ room.title }}</div>
          <div class="m-meta">
            <span class="m-chip"><i data-lucide="user-round"></i>{{ room.teacher }}</span>
            <span class="m-chip"><i data-lucide="users"></i>{{ room.onlineCount }} 人在线</span>
          </div>
        </div>
        <div class="m-head-right">
          <span class="m-live-chip"><i class="live-pulse"></i>{{ room.badge }}</span>
          <span class="m-duration">{{ currentDuration }}</span>
          <span class="m-signal-chip"><i class="signal-bars"><b class="on"></b><b class="on"></b><b></b><b></b></i></span>
        </div>
      </header>

      <!-- 视频区 -->
      <div class="m-stage" :class="{ 'stage-live': room.started }">
        <div v-if="room.started" class="m-camera"><span>老师摄像头</span></div>
        <div v-if="!room.started" class="m-start">
          <p>课程已开放进入</p>
          <span>{{ room.description }}</span>
          <button class="m-btn-primary" @click="startLive">开始观看直播</button>
        </div>
        <div v-else class="m-live-hint">
          <p class="m-live-tag">直播画面</p>
          <h3>共享屏幕画面</h3>
          <span>{{ room.liveHint }}</span>
        </div>
        <!-- 全屏状态右上角信息 -->
        <div class="m-fs-info">
          <span class="m-duration">{{ currentDuration }}</span>
          <span class="m-signal-chip"><i class="signal-bars"><b class="on"></b><b class="on"></b><b></b><b></b></i></span>
        </div>
        <!-- 全屏按钮 -->
        <button class="m-fullscreen-btn" @click="toggleFullscreen">
          <i :data-lucide="isFullscreen ? 'shrink' : 'expand'"></i>
        </button>
      </div>

      <!-- 互动区 -->
      <div class="m-chat">
        <div class="m-chat-bar"><strong>互动区</strong></div>
        <div class="m-chat-body">
          <div class="m-msg-list" ref="msgList">
            <article class="m-msg" :class="['msg-'+msg.type, { 'msg-self': msg.user === '我' }]"
              v-for="msg in messages" :key="msg.id">
              <div class="m-msg-top">
                <span v-if="msg.type === 'teacher'" class="role-badge teacher-badge">讲</span>
                <span v-if="msg.type === 'system'" class="role-badge assistant-badge">助</span>
                <strong>{{ msg.user }}</strong>
                <span class="m-msg-time">{{ msg.time }}</span>
              </div>
              <p class="m-bubble">{{ msg.content }}</p>
            </article>
          </div>
          <div class="m-chat-foot">
            <div v-if="canChat" class="m-input-row">
              <textarea class="m-input" v-model.trim="inputMsg" @keydown.enter.exact.prevent="sendMsg"
                rows="1" maxlength="120" placeholder="输入消息"></textarea>
              <button class="m-btn-primary m-send" @click="sendMsg">{{ sending ? '…' : '发送' }}</button>
            </div>
            <p v-else class="m-mute-tip">{{ muteTip }}</p>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="../vendor/vue.min.js"></script>
  <script src="watch-mobile.js"></script>
</body>
</html>
