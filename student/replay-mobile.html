<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>分节回放</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23198f72'/%3E%3Cpath d='M18 20h24a6 6 0 0 1 6 6v12a6 6 0 0 1-6 6H18z' fill='white'/%3E%3Cpath d='M42 29l10-6v18l-10-6z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style-mobile.css">
  <script src="../vendor/lucide.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="m-wrap">

      <!-- 顶部栏 -->
      <header class="m-head">
        <div class="m-head-main">
          <div class="m-title">{{ replay.title }} - 回放</div>
          <div class="m-meta">
            <span class="m-chip"><i data-lucide="user-round"></i>{{ replay.teacher }}</span>
          </div>
        </div>
      </header>

      <!-- 视频区 -->
      <div class="m-video-wrap">
        <video controls preload="metadata" :key="activeReplay.id" class="m-video">
          <source :src="activeReplay.video" type="video/mp4">
        </video>
      </div>

      <!-- 分节列表（横向滚动） -->
      <div class="m-seg-bar">
        <button v-for="(seg, idx) in replay.segments" :key="seg.id"
          class="m-seg" :class="{ active: activeReplayId === seg.id }"
          @click="activeReplayId = seg.id">
          第 {{ idx + 1 }} 节
        </button>
      </div>

    </div>
  </div>
  <script src="../vendor/vue.min.js"></script>
  <script src="replay.js"></script>
</body>
</html>
