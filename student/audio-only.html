<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>直播中</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    body{
      background:radial-gradient(ellipse at 30% 40%, #1a2e3b 0%, #0f1724 55%, #080e18 100%);
      display:flex;align-items:center;justify-content:center;
      font-family:"PingFang SC","Helvetica Neue",sans-serif;
    }
    .card{
      display:flex;flex-direction:column;align-items:center;gap:28px;
    }
    .icon-wrap{
      width:120px;height:120px;border-radius:28px;
      background:rgba(31,139,115,.12);
      border:1px solid rgba(31,139,115,.18);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 48px rgba(31,139,115,.15);
    }
    .info{
      display:flex;flex-direction:column;align-items:center;gap:10px;
    }
    .live-badge{
      display:inline-flex;align-items:center;gap:8px;
      font-size:15px;color:rgba(255,255,255,.55);font-weight:400;
    }
    .bars{
      display:inline-flex;align-items:flex-end;gap:3px;height:14px;
    }
    .bars i{
      display:block;width:3px;border-radius:2px;
      background:rgba(255,255,255,.5);
    }
    .bars i:nth-child(1){animation:bar 1s ease-in-out infinite;animation-delay:0s}
    .bars i:nth-child(2){animation:bar 1s ease-in-out infinite;animation-delay:.2s}
    .bars i:nth-child(3){animation:bar 1s ease-in-out infinite;animation-delay:.4s}
    @keyframes bar{0%,100%{height:4px}50%{height:14px}}
    .teacher{
      font-size:15px;color:rgba(255,255,255,.45);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg width="64" height="64" viewBox="0 0 1024 1024" fill="none">
        <path d="M310.9 690.9c98.7 0 178.8-80.1 178.8-178.9s-80.1-178.9-178.8-178.9S132.1 413.2 132.1 512s80 178.9 178.8 178.9zM87.3 377.8C75 377.8 65 367.7 65 355.5v-222c0-13.3 10.7-24 24-24h846c13.3 0 24 10.7 24 24v667.6c0 13.3-10.7 24-24 24H623.8c-12.3 0-22.4-10-22.4-22.4 0-12.4 10-22.4 22.4-22.4h289.5c0.5 0 1-0.4 1-1V155.2c0-0.5-0.4-1-1-1H110.7c-0.6 0-1 0.4-1 1v200.3c0 12.3-10 22.3-22.4 22.3z m550.5 157c-0.8-0.8-0.8-2.1 0-2.8l147.3-147.3c9.1-9.1 23.9-9.1 33 0 9.1 9.1 9.1 23.9 0 33L670.8 565c-0.8 0.8-2 0.8-2.8 0l-30.2-30.2zM507 784.6c-19.5 31.5-17.3 104.1-17.3 104.1s-5.4 10.2-22.4 25.6c-50.5 0.3-379.9 0-379.9 0s-11-11.8-22.4-25.5c0-96.5 69.6-186.4 69.6-186.4s8.7-15.1 22.4-16.9c9-1.1 14.9 1.8 17.9 3.8 0.4 0.3 0.9 0.7 1.3 1 38.2 28.6 84.5 45.1 134.6 45.1 49 0 94.3-15.8 131.2-42.5l143.4-107.1c4.1-4.1 9.7-6.7 16-6.7 12.3 0 22.3 10 22.3 22.3 0 4.5-1.3 8.6-3.6 12.1 0.2 0.2-93.6 139.6-113.1 171.1z" fill="#1f8b73"/>
      </svg>
    </div>
    <div class="info">
      <span class="live-badge">
        <span class="bars"><i></i><i></i><i></i></span>
        直播中
      </span>
      <span class="teacher" id="teacherEl"></span>
    </div>
  </div>
  <script>
    const p = new URLSearchParams(location.search);
    const teacher = p.get('teacher') || '';
    const el = document.getElementById('teacherEl');
    if (teacher) el.textContent = '直播老师：' + teacher;
  </script>
</body>
</html>
